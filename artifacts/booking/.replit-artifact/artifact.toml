kind = "web"
previewPath = "/"
title = "Booking App"
version = "1.0.0"
id = "artifacts/booking"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24491

[services.development]
run = "pnpm --filter @workspace/booking run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/booking", "run", "build" ]
publicDir = "artifacts/booking/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24491"
BASE_PATH = "/"
